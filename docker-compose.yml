version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ncc-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=ncc_maharashtra

  app:
    build: .
    container_name: ncc-app
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ncc_maharashtra
      - JWT_SECRET=${JWT_SECRET:-ncc01mahairsqn_jwt_secret_2024}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

volumes:
  mongo-data:
